asyncapi: 2.6.0
info:
  title: SmartHome AsyncAPI — "Тёплый дом"
  version: 1.0.0
  description: Топики Kafka для событий между сервисами.
    Топик telemetry.events, в который пишет Telemetry Service

servers:
  kafka:
    url: http://localhost:9092
    protocol: kafka
    description: Kafka cluster

channels:
  telemetry.events:
    description: |
      Поток событий телеметрии от устройств.
      Producer: Telemetry Service (Telemetry Handler)
    subscribe:
      operationId: receiveTelemetryEvent
      summary: Подписка на события телеметрии
      message:
        $ref: '#/components/messages/TelemetryEvent'

components:
  messages:
    TelemetryEvent:
      name: TelemetryEvent
      title: Событие телеметрии
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TelemetryEvent'
      examples:
        - name: temperature_below_threshold
          summary: Температура упала ниже 18°C
          payload:
            event_id: "ee1a3c4d-7b89-4a6f-bc22-1d8e9f3a2c01"
            device_id: "sensor-1"
            metric: "temperature"
            value: 17.5
            recorded_at: "2026-04-29T10:14:55Z"

  schemas:
    TelemetryEvent:
      type: object
      required: [event_id, device_id, metric, value, recorded_at]
      properties:
        event_id:
          type: string
          format: uuid
          description: Уникальный ID события (для дедупликации на стороне consumer)
        device_id:
          type: string
          format: uuid
        metric:
          type: string
          description: Имя метрики
          example: "temperature"
        value:
          type: number
          description: Значение метрики
        recorded_at:
          type: string
          format: date-time
          description: Время измерения на устройстве